version: "3.9"

services:
  kali:
    build:
      context: .
      dockerfile: Dockerfile.kali
    image: kratos-kali
    container_name: kratos-kali
    tty: true
    stdin_open: true
    network_mode: host
    volumes:
      - kratos-workspace:/workspace
    restart: unless-stopped

volumes:
  kratos-workspace:
